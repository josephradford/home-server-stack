---
# Life - calendar, weather, etc
- Today:
    - BOM Weather:
        icon: mdi-weather-partly-cloudy
        href: http://www.bom.gov.au/
        description: Australian weather forecast
        widget:
          type: customapi
          url: http://homepage-api:5000/api/bom/weather
          refreshInterval: 300000  # 5 minutes
          mappings:
            - field: observations.temp
              label: Temperature
              suffix: "°C"
            - field: observations.temp_feels_like
              label: Feels Like
              suffix: "°C"
            - field: observations.humidity
              label: Humidity
              suffix: "%"
            - field: forecast_daily.0.short_text
              label: Today

    - Google Calendar:
        icon: google-calendar.png
        href: https://calendar.google.com
        description: Upcoming events
        widget:
          type: calendar
          view: agenda
          showTime: true
          integrations:
            - type: ical
              url: {{HOMEPAGE_VAR_GCAL_ICAL_URL}}
              name: Personal Calendar
              color: blue
              maxEvents: 5

# Transport
- "{{HOMEPAGE_VAR_TRANSPORT_SECTION_1}}":
    - "{{HOMEPAGE_VAR_TRANSPORT_STOP_1_NAME}}":
        icon: {{HOMEPAGE_VAR_TRANSPORT_STOP_1_ICON}}
        description: "{{HOMEPAGE_VAR_TRANSPORT_SECTION_1}}"
        widget:
          type: customapi
          url: http://homepage-api:5000/api/transport/departures/{{HOMEPAGE_VAR_TRANSPORT_STOP_1_ID}}?{{HOMEPAGE_VAR_TRANSPORT_STOP_1_FILTER}}
          refreshInterval: 60000
          mappings:
            - field: departures.0.line
              label: Next
            - field: departures.0.time
              label: Departs
              format: relativeDate
            - field: departures.1.line
              label: Following
            - field: departures.1.time
              label: Departs
              format: relativeDate

    - "{{HOMEPAGE_VAR_TRANSPORT_STOP_2_NAME}}":
