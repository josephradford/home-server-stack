        href: https://transportnsw.info/
        description: View all services

# Core Services - Primary user-facing services that "do stuff"
- Services:
  - Core Services:
      - AdGuard Home:
          icon: adguard-home.png
          href: https://adguard.{{HOMEPAGE_VAR_DOMAIN}}
          description: Network-wide ad blocking
          widget:
            type: adguard
            url: http://adguard-home
            username: {{HOMEPAGE_VAR_ADGUARD_USER}}
            password: {{HOMEPAGE_VAR_ADGUARD_PASS}}
          container: adguard-home
          server: my-docker
          showStats: true

      - n8n:
          icon: n8n.png
          href: https://n8n.{{HOMEPAGE_VAR_DOMAIN}}
          description: Workflow automation
          container: n8n
          server: my-docker
          showStats: true

  # Monitoring Stack - Metrics collection and visualization
  - Monitoring:
      - Prometheus:
          icon: prometheus.png
          href: https://prometheus.{{HOMEPAGE_VAR_DOMAIN}}
          description: Metrics & alerting
          widget:
            type: prometheus
            url: http://prometheus:9090
          container: prometheus
          server: my-docker
          showStats: true

      - Grafana:
          icon: grafana.png
          href: https://grafana.{{HOMEPAGE_VAR_DOMAIN}}
          description: Monitoring dashboards
          widget:
            type: grafana
            url: http://grafana:3000
            username: {{HOMEPAGE_VAR_GRAFANA_USER}}
            password: {{HOMEPAGE_VAR_GRAFANA_PASS}}
          container: grafana
          server: my-docker
          showStats: true

      - Alertmanager:
          icon: alertmanager.png
          href: https://alerts.{{HOMEPAGE_VAR_DOMAIN}}
          description: Alert management
          container: alertmanager
          server: my-docker
          showStats: true

      - Node Exporter:
          icon: mdi-server
          description: System metrics exporter
          container: node-exporter
          server: my-docker
          showStats: true

      - cAdvisor:
          icon: mdi-docker
          description: Container metrics exporter
          container: cadvisor
          server: my-docker
          showStats: true

  # Dashboard Services - Homepage dashboard and backend
  - Dashboard:
      - Homepage API:
          icon: mdi-api
          description: Backend API for custom widgets
          container: homepage-api
          server: my-docker
          showStats: true

  # Network & Security - Infrastructure services for routing, VPN, and security
  - Network & Security:
      - Traefik:
          icon: traefik.png
          href: https://traefik.{{HOMEPAGE_VAR_DOMAIN}}
          description: Reverse proxy management
          widget:
            type: traefik
            url: http://traefik:8080
          container: traefik
          server: my-docker
          showStats: true

      - Wireguard VPN:
          icon: wireguard.png
          description: VPN server (system service)
          widget:
            type: customapi
            url: http://homepage-api:5000/api/wireguard/status
            refreshInterval: 30000  # 30 seconds
            mappings:
              - field: status
                label: Status
              - field: interface
                label: Interface

      - Fail2ban:
          icon: mdi-shield-lock
          description: Intrusion prevention system
          container: fail2ban
          server: my-docker
          showStats: true

      - Docker Daemon:
          icon: mdi-docker
          description: Container runtime (system service)
          widget:
            type: customapi
            url: http://homepage-api:5000/api/docker/status
            refreshInterval: 30000  # 30 seconds
            mappings:
              - field: status
                label: Status
              - field: containers
                label: Containers
              - field: version
                label: Version
              - field: disk_usage
                label: Disk Usage

  # AI Services - Bede assistant and workspace integrations
  - AI Services:
      - Bede Core:
          icon: mdi-robot
          description: Personal assistant
          container: bede-core
          server: my-docker
          showStats: true

      - Bede Data:
          icon: mdi-database
          description: Data ingest & query API
          container: bede-data
          server: my-docker
          showStats: true

      - Bede Data MCP:
          icon: mdi-connection
          description: MCP server for Bede data access
          container: bede-data-mcp
          server: my-docker
          showStats: true

      - Bede Workspace MCP:
          icon: mdi-google
          description: Google Workspace MCP (Gmail, Calendar, Tasks)
          container: bede-workspace-mcp
          server: my-docker
          showStats: true
      - Bede Web:
          icon: mdi-monitor-dashboard
          href: https://bede.{{HOMEPAGE_VAR_DOMAIN}}
          description: Bede operational dashboard
          container: bede-web
          server: my-docker
          showStats: true

  # Location Services - Location tracking
  - Location:
      - OwnTracks:
          icon: mdi-map-marker
          href: https://owntracks.{{HOMEPAGE_VAR_DOMAIN}}
          description: Location tracking recorder
          container: owntracks-recorder
          server: my-docker
          showStats: true
