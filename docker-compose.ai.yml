services:
  bede:
    image: ghcr.io/josephradford/bede:latest
    container_name: bede
    restart: unless-stopped
    profiles:
      - disabled
    env_file: .env
    environment:
      - CLAUDE_WORKDIR=/app
      - SESSION_TIMEOUT_MINUTES=120
      - ANTHROPIC_API_KEY=
      - SQLITE_DB_PATH=/data/sqlite/bede.db
      - INGEST_URL=http://bede-data:8001/ingest/vault
      - INGEST_WRITE_TOKEN=${INGEST_WRITE_TOKEN}
      - DEFAULT_TIMEZONE=${TIMEZONE:-Australia/Sydney}
      - OWNTRACKS_URL=http://owntracks-recorder:8083
      - HOMEPAGE_API_URL=http://homepage-api:5000
      - OWNTRACKS_USER=${OWNTRACKS_USER}
      - OWNTRACKS_DEVICE=${OWNTRACKS_DEVICE}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REDIRECT_URI=https://mcp.${DOMAIN}/oauth2callback
      - GOOGLE_MCP_CREDENTIALS_DIR=/data/workspace-mcp/credentials
      - WORKSPACE_MCP_OAUTH_PROXY_STORAGE_BACKEND=disk
      - WORKSPACE_MCP_OAUTH_PROXY_DISK_DIRECTORY=/data/workspace-mcp/oauth-proxy
      - MCP_SINGLE_USER_MODE=true
      - USER_GOOGLE_EMAIL=${USER_GOOGLE_EMAIL}
    volumes:
      - ./data/bede/CLAUDE.md:/app/CLAUDE.md:ro
      - ${HOME}/.claude/.credentials.json:/home/bede/.claude/.credentials.json
      - ./data/bede/claude-projects:/home/bede/.claude/projects
      - ./data/bede/vault:/vault
      - ${VAULT_SSH_KEY_PATH:-/dev/null}:/home/bede/.ssh/vault_key:ro
      - ./data/bede:/data
    networks:
      - homeserver
      - location
    labels:
      - "traefik.enable=true"
      # workspace-mcp: mcp.DOMAIN -> port 8003
      - "traefik.http.routers.workspace-mcp.rule=Host(`mcp.${DOMAIN}`)"
      - "traefik.http.routers.workspace-mcp.entrypoints=websecure"
      - "traefik.http.routers.workspace-mcp.tls=true"
      - "traefik.http.routers.workspace-mcp.middlewares=admin-secure-no-ratelimit@docker"
      - "traefik.http.routers.workspace-mcp.service=workspace-mcp"
      - "traefik.http.services.workspace-mcp.loadbalancer.server.port=8003"

  bede-data:
    image: ghcr.io/josephradford/bede-data:latest
    container_name: bede-data
    restart: unless-stopped
    environment:
      - SQLITE_DB_PATH=/data/sqlite/bede.db
      - INGEST_WRITE_TOKEN=${INGEST_WRITE_TOKEN}
      - TIMEZONE=${TIMEZONE:-Australia/Sydney}
    volumes:
      - ./data/bede/sqlite:/data/sqlite
    networks:
      - homeserver
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      # data-ingest: data.DOMAIN -> port 8001
      - "traefik.http.routers.data-ingest.rule=Host(`data.${DOMAIN}`)"
      - "traefik.http.routers.data-ingest.entrypoints=websecure"
      - "traefik.http.routers.data-ingest.tls=true"
      - "traefik.http.routers.data-ingest.middlewares=webhook-secure@docker"
      - "traefik.http.routers.data-ingest.service=data-ingest"
      - "traefik.http.services.data-ingest.loadbalancer.server.port=8001"

  bede-data-mcp:
    image: ghcr.io/josephradford/bede-data-mcp:latest
    container_name: bede-data-mcp
    restart: unless-stopped
    environment:
      - BEDE_DATA_URL=http://bede-data:8001
      - DATA_MCP_PORT=8002
    networks:
      - homeserver
    depends_on:
      bede-data:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8002), timeout=5); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3

  bede-core:
    image: ghcr.io/josephradford/bede-core:latest
    container_name: bede-core
    restart: unless-stopped
    env_file: .env
    environment:
      - CLAUDE_WORKDIR=/app
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - CLAUDE_TIMEOUT_SECONDS=300
      - SESSION_TIMEOUT_MINUTES=120
      - INTERACTIVE_IDLE_TIMEOUT_MINUTES=30
      - INTERACTIVE_MAX_AGE_HOURS=2
      - ANTHROPIC_API_KEY=
      - BEDE_DATA_URL=http://bede-data:8001
      - TIMEZONE=${TIMEZONE:-Australia/Sydney}
      - VAULT_REPO=${VAULT_REPO}
      - VAULT_PATH=/vault
    volumes:
      - ./data/bede/CLAUDE.md:/app/CLAUDE.md:ro
      - ${HOME}/.claude/.credentials.json:/home/bede/.claude/.credentials.json
      - ./data/bede/claude-projects:/home/bede/.claude/projects
      - ./data/bede/vault:/vault
      - ${VAULT_SSH_KEY_PATH:-/dev/null}:/home/bede/.ssh/vault_key:ro
    networks:
      - homeserver
    depends_on:
      bede-data:
        condition: service_healthy
      bede-data-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  homeserver:
    external: true
    name: home-server-stack_homeserver
  location:
    external: true
    name: home-server-stack_location
