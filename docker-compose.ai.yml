services:
  bede:
    build:
      context: ./bede
    container_name: bede
    restart: unless-stopped
    env_file: .env
    environment:
      - CLAUDE_WORKDIR=/app
      - SESSION_TIMEOUT_MINUTES=10
      - ANTHROPIC_API_KEY=  # blank out shared .env value — bede uses OAuth, not API key
    volumes:
      # Persona file — gitignored (personal). Copy from bede/CLAUDE.md.example and customise.
      - ./bede/CLAUDE.md:/app/CLAUDE.md:ro
      # OAuth credentials — must exist on host before starting.
      # To sync from Mac: security find-generic-password -s "Claude Code-credentials" -w | ssh user@SERVER_IP "cat > ~/.claude/.credentials.json"
      - ${HOME}/.claude/.credentials.json:/home/bede/.claude/.credentials.json
      # Obsidian vault (populated by entrypoint when VAULT_REPO is set)
      - ./data/bede/vault:/vault
      # SSH key for private vault repos (optional — leave VAULT_SSH_KEY_PATH blank for HTTPS PAT)
      - ${VAULT_SSH_KEY_PATH:-/dev/null}:/home/bede/.ssh/vault_key:ro
    depends_on:
      - workspace-mcp
      - data-mcp
    networks:
      - default
      - homeserver
    # No Traefik labels — bede communicates outbound via Telegram only

  workspace-mcp:
    build:
      context: ./bede/workspace-mcp
    container_name: workspace-mcp
    restart: unless-stopped
    environment:
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REDIRECT_URI=https://mcp.${DOMAIN}/oauth2callback
      - GOOGLE_MCP_CREDENTIALS_DIR=/data/credentials
      - WORKSPACE_MCP_OAUTH_PROXY_STORAGE_BACKEND=disk
      - WORKSPACE_MCP_OAUTH_PROXY_DISK_DIRECTORY=/data/oauth-proxy
      - MCP_SINGLE_USER_MODE=true
    volumes:
      # Persists OAuth tokens across container restarts
      - workspace-mcp-tokens:/data
    networks:
      - default
      - homeserver
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.workspace-mcp.rule=Host(`mcp.${DOMAIN}`)"
      - "traefik.http.routers.workspace-mcp.entrypoints=websecure"
      - "traefik.http.routers.workspace-mcp.tls=true"
      - "traefik.http.routers.workspace-mcp.middlewares=admin-secure-no-ratelimit@docker"
      - "traefik.http.services.workspace-mcp.loadbalancer.server.port=8000"

  data-ingest:
    build:
      context: ./bede/data-ingest
    container_name: data-ingest
    restart: unless-stopped
    volumes:
      - ./data/bede/sqlite:/data
    environment:
      SQLITE_DB_PATH: /data/bede.db
      INGEST_WRITE_TOKEN: ${INGEST_WRITE_TOKEN}
      DEFAULT_TIMEZONE: ${TIMEZONE:-Australia/Sydney}
    expose:
      - 8000
    networks:
      - homeserver
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.data-ingest.rule=Host(`data.${DOMAIN}`)"
      - "traefik.http.routers.data-ingest.entrypoints=websecure"
      - "traefik.http.routers.data-ingest.tls=true"
      - "traefik.http.services.data-ingest.loadbalancer.server.port=8000"
      - "traefik.http.routers.data-ingest.middlewares=admin-secure@docker"

  data-mcp:
    build:
      context: ./bede/data-mcp
    container_name: data-mcp
    restart: unless-stopped
    volumes:
      # SQLite database (read-write needed for WAL -shm/-wal files)
      - ./data/bede/sqlite:/data
    environment:
      SQLITE_DB_PATH: /data/bede.db
      OWNTRACKS_URL: http://owntracks-recorder:8083
      OWNTRACKS_USER: ${OWNTRACKS_USER}
      OWNTRACKS_DEVICE: ${OWNTRACKS_DEVICE}
      DEFAULT_TIMEZONE: Australia/Sydney
    expose:
      - 8000
    networks:
      - default
      - location

volumes:
  workspace-mcp-tokens:

networks:
  default:
  homeserver:
    external: true
    name: home-server-stack_homeserver
  location:
    external: true
    name: home-server-stack_location
